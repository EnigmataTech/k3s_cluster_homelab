---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forgejo
  namespace: forgejo
  labels:
    app: forgejo
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-dns01-production"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "2048m"  # Allow large Git pushes (increased for Lean repo)
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/client-body-buffer-size: "1024m"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - git.dev.enigmata.pro
    secretName: forgejo-dev-enigmata-pro-tls
  rules:
  - host: git.dev.enigmata.pro
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: forgejo
            port:
              number: 3000
