---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: forgejo
  namespace: forgejo
  labels:
    app: forgejo
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-dns01-production"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "512m"  # Allow large Git pushes
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - git.dev.enigmata.pro
    secretName: forgejo-dev-enigmata-pro-tls
  rules:
  - host: git.dev.enigmata.pro
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: forgejo
            port:
              number: 3000
