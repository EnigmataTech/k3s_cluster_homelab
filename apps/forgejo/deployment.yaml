---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-data
  namespace: forgejo
  labels:
    app: forgejo
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
  labels:
    app: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      initContainers:
      - name: init-directories
        image: busybox:latest
        command:
        - /bin/sh
        - -c
        - |
          mkdir -p /data/git/repositories /data/git/lfs /data/git/.ssh /data/tmp /data/log /data/attachments /data/indexers /data/gitea
          chown -R 1000:1000 /data
          chmod -R 755 /data
          # Copy configmap to writable location for environment-to-ini
          mkdir -p /gitea-conf
          cp /config-ro/app.ini /gitea-conf/app.ini
          chown 1000:1000 /gitea-conf/app.ini
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config-ro
          mountPath: /config-ro
        - name: config
          mountPath: /gitea-conf
        securityContext:
          runAsUser: 0
          privileged: true
      containers:
      - name: forgejo
        image: codeberg.org/forgejo/forgejo:9.0.3-rootless
        ports:
        - containerPort: 3000
          name: http
        - containerPort: 22
          name: ssh
        env:
        - name: USER_UID
          value: "1000"
        - name: USER_GID
          value: "1000"
        - name: FORGEJO__database__PASSWD
          valueFrom:
            secretKeyRef:
              name: postgresql-credentials
              key: password
        - name: FORGEJO__security__SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: forgejo-secrets
              key: secret-key
        - name: FORGEJO__security__INTERNAL_TOKEN
          valueFrom:
            secretKeyRef:
              name: forgejo-secrets
              key: internal-token
        - name: FORGEJO__server__LFS_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: forgejo-secrets
              key: secret-key
        volumeMounts:
        - name: data
          mountPath: /data
        - name: config
          mountPath: /var/lib/gitea/custom/conf
        - name: temp
          mountPath: /tmp
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /api/healthz
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
        readinessProbe:
          httpGet:
            path: /api/healthz
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 5
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: forgejo-data
      - name: config-ro
        configMap:
          name: forgejo-config
      - name: config
        emptyDir: {}
      - name: temp
        emptyDir: {}
