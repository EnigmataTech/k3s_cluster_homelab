apiVersion: apps/v1
kind: Deployment
metadata:
  name: coredns
  namespace: tailscale-ingress
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: coredns
  template:
    metadata:
      labels:
        app: coredns
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeName: k3s-worker-01
      containers:
        - name: coredns
          image: coredns/coredns:1.11.3
          args: ["-conf", "/etc/coredns/Corefile"]
          securityContext:
            capabilities:
              add:
                - NET_BIND_SERVICE
            seccompProfile:
              type: Unconfined
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/coredns
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: coredns-config
