apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wazuh-manager
  namespace: wazuh
spec:
  serviceName: wazuh-manager
  replicas: 1
  selector:
    matchLabels:
      app: wazuh-manager
  template:
    metadata:
      labels:
        app: wazuh-manager
    spec:
      initContainers:
        # Seed /var/ossec PVC from the image's bundled installation (first run only)
        - name: init-wazuh-data
          image: wazuh/wazuh-manager:4.14.0
          command: ["sh", "-c", "if [ ! -d /data/framework ]; then cp -aR /var/ossec/. /data/; fi"]
          volumeMounts:
            - name: wazuh-manager-data
              mountPath: /data
        # Ensure required dirs exist and apply ossec.conf from configmap on every start
        # This fixes two issues:
        # 1. /var/ossec/var/multigroups being empty causes 0-wazuh-init to exit early
        # 2. When 0-wazuh-init exits early, mount_files() never runs so ossec.conf isn't updated
        - name: apply-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /data/var/multigroups
              touch /data/var/multigroups/.keep
              cp /config/ossec.conf /data/etc/ossec.conf
              chmod 664 /data/etc/ossec.conf
              echo "apply-config: ossec.conf and multigroups fixed"
          volumeMounts:
            - name: wazuh-manager-data
              mountPath: /data
            - name: ossec-conf
              mountPath: /config/ossec.conf
              subPath: ossec.conf
              readOnly: true
        # Wait for indexer port to be available before starting manager
        - name: wait-for-indexer
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z wazuh-indexer 9200; do
                echo "Waiting for Wazuh indexer port..."
                sleep 10
              done
              echo "Indexer port is up."
        # Copy jq binary into shared tools volume
        - name: install-jq
          image: alpine:3.19
          command: ["sh", "-c", "apk add --no-cache jq && cp /usr/bin/jq /tools/jq"]
          volumeMounts:
            - name: tools
              mountPath: /tools
      containers:
        - name: wazuh-manager
          image: wazuh/wazuh-manager:4.14.0
          env:
            - name: PATH
              value: "/tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: INDEXER_URL
              value: "https://wazuh-indexer:9200"
            - name: INDEXER_USERNAME
              value: "admin"
            - name: INDEXER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-credentials
                  key: indexer-admin-password
            - name: FILEBEAT_SSL_VERIFICATION_MODE
              value: "full"
            - name: SSL_CERTIFICATE_AUTHORITIES
              value: "/etc/ssl/root-ca.pem"
            - name: SSL_CERTIFICATE
              value: "/etc/ssl/filebeat.pem"
            - name: SSL_KEY
              value: "/etc/ssl/filebeat.key"
            - name: API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: wazuh-credentials
                  key: api-username
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wazuh-credentials
                  key: api-password
          ports:
            - containerPort: 1514
              name: agent-events
              protocol: TCP
            - containerPort: 1515
              name: agent-enroll
              protocol: TCP
            - containerPort: 514
              name: syslog
              protocol: UDP
            - containerPort: 55000
              name: api
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1.5Gi
          volumeMounts:
            - name: wazuh-manager-data
              mountPath: /var/ossec
            - name: wazuh-manager-filebeat
              mountPath: /etc/filebeat
              subPath: filebeat-etc
            - name: wazuh-manager-filebeat
              mountPath: /var/lib/filebeat
              subPath: filebeat-var
            - name: manager-certs
              mountPath: /etc/ssl
              readOnly: true
            - name: ossec-conf
              mountPath: /wazuh-config-mount/etc/ossec.conf
              subPath: ossec.conf
              readOnly: true
            - name: local-rules
              mountPath: /wazuh-config-mount/etc/rules/local_rules.xml
              subPath: local_rules.xml
              readOnly: true
            - name: custom-ntfy-script
              mountPath: /var/ossec/integrations/custom-ntfy
              subPath: custom-ntfy
            - name: tools
              mountPath: /tools
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - "/var/ossec/bin/wazuh-control status | grep -q 'wazuh-analysisd is running'"
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 10
      volumes:
        - name: manager-certs
          projected:
            sources:
              - secret:
                  name: wazuh-manager-cert
                  items:
                    - key: ca.crt
                      path: root-ca.pem
                    - key: tls.crt
                      path: filebeat.pem
                    - key: tls.key
                      path: filebeat.key
        - name: ossec-conf
          configMap:
            name: wazuh-manager-config
            items:
              - key: ossec.conf
                path: ossec.conf
        - name: local-rules
          configMap:
            name: wazuh-manager-config
            items:
              - key: local_rules.xml
                path: local_rules.xml
        - name: custom-ntfy-script
          configMap:
            name: wazuh-manager-config
            defaultMode: 0755
            items:
              - key: custom-ntfy
                path: custom-ntfy
        - name: tools
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: wazuh-manager-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn-single
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: wazuh-manager-filebeat
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn-single
        resources:
          requests:
            storage: 1Gi
