# LoadBalancer service for Wazuh agent connections from outside the cluster
# MetalLB will assign IP 192.168.1.242
# Agents connect here for enrollment (1515), events (1514), and API (55000)
apiVersion: v1
kind: Service
metadata:
  name: wazuh-agents
  namespace: wazuh
  annotations:
    metallb.universe.tf/loadBalancerIPs: "192.168.1.242"
spec:
  type: LoadBalancer
  selector:
    app: wazuh-manager
  ports:
    - name: agent-events
      port: 1514
      targetPort: 1514
      protocol: TCP
    - name: agent-enrollment
      port: 1515
      targetPort: 1515
      protocol: TCP
    - name: api
      port: 55000
      targetPort: 55000
      protocol: TCP
    - name: syslog-udp
      port: 514
      targetPort: 514
      protocol: UDP
