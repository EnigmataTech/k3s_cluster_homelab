apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netalertx
  namespace: netalertx
  annotations:
    nginx.ingress.kubernetes.io/whitelist-source-range: "192.168.1.0/24,100.64.0.0/10,10.42.0.0/16"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: netalertx.enigmata.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: netalertx
                port:
                  number: 80
