#     http:
#       paths:
#       - path: /
#         pathType: Prefix
#         backend:
#           service:
#             name: whoami
#             port:
#               number: 80

---
# How to verify certificate issuance:
#
# 1. Watch certificate creation:
#    kubectl get certificate -n whoami-test -w
#
# 2. Check certificate details:
#    kubectl describe certificate whoami-tls-staging -n whoami-test
#
# 3. Check certificate request:
#    kubectl get certificaterequest -n whoami-test
#
# 4. View ACME challenge:
#    kubectl get challenges -n whoami-test
#
# 5. Check cert-manager logs if issues:
#    kubectl logs -n cert-manager -l app=cert-manager -f
#
# 6. Test HTTPS access:
#    curl -v https://whoami.example.com
#    (staging cert will show as untrusted - this is expected)
#
# Expected Certificate states:
# - Pending: Initial state, waiting for issuance
# - Ready: Certificate issued and stored in secret
# - Failed: Check describe output for errors
