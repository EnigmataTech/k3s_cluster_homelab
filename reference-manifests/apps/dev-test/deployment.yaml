---
apiVersion: v1
kind: Namespace
metadata:
  name: dev-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: dev-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
    spec:
      containers:
      - name: whoami
        image: traefik/whoami:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: whoami
  namespace: dev-test
spec:
  selector:
    app: whoami
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dev-enigmata
  namespace: dev-test
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-dns01-staging"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - dev.enigmata.pro
    secretName: dev-enigmata-pro-tls
  rules:
  - host: dev.enigmata.pro
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: whoami
            port:
              number: 80
