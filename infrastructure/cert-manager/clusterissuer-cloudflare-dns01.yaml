---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns01-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: enigmatatech@protonmail.com
    privateKeySecretRef:
      name: letsencrypt-dns01-staging
    solvers:
    - dns01:
        cloudflare:
          email: enigmatatech@protonmail.com
          apiTokenSecretRef:
            name: cloudflare-api-token-secret
            key: api-token
      selector:
        dnsZones:
        - enigmata.pro
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns01-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: enigmatatech@protonmail.com
    privateKeySecretRef:
      name: letsencrypt-dns01-production
    solvers:
    - dns01:
        cloudflare:
          email: enigmatatech@protonmail.com
          apiTokenSecretRef:
            name: cloudflare-api-token-secret
            key: api-token
      selector:
        dnsZones:
        - enigmata.pro
