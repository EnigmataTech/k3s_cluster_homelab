# Let's Encrypt Production ClusterIssuer
# Use this issuer only after testing with staging
# Production certificates are trusted by browsers
# Subject to rate limits: 50 certificates per domain per week
#
# IMPORTANT: Replace user@example.com with your actual email address

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt production server (rate limited)
    server: https://acme-v02.api.letsencrypt.org/directory

    # CHANGE THIS: Your email address for Let's Encrypt notifications
    email: EnigmataTech@protonmail.com

    # Secret to store the ACME account private key
    privateKeySecretRef:
      name: letsencrypt-prod

    # HTTP-01 challenge solver using nginx ingress
    solvers:
    - http01:
        ingress:
          class: nginx
