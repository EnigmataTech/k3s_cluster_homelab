apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: "1.10.x"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
      interval: 12h
  values:
    defaultSettings:
      defaultReplicaCount: 2
      defaultDataPath: /var/lib/longhorn
    service:
      ui:
        type: ClusterIP
    extraManifests:
      - apiVersion: v1
        kind: Service
        metadata:
          name: longhorn-frontend-nodeport
          namespace: longhorn-system
        spec:
          type: NodePort
          ports:
            - port: 80
              targetPort: http
              nodePort: 30880
          selector:
            app: longhorn-ui
