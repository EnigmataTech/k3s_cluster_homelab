apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: longhorn-multipath-fix
  namespace: longhorn-system
  labels:
    app: longhorn-multipath-fix
spec:
  selector:
    matchLabels:
      app: longhorn-multipath-fix
  template:
    metadata:
      labels:
        app: longhorn-multipath-fix
    spec:
      hostPID: true
      containers:
      - name: multipath-fix
        image: busybox:1.37
        command:
        - /bin/sh
        - -c
        - |
          nsenter -t 1 -m -u -i -n -- sh -c 'grep -q "Longhorn fix" /etc/multipath.conf 2>/dev/null && echo "Already applied" && exit 0; echo -e "# Longhorn fix\ndefaults {\n    user_friendly_names yes\n}\nblacklist {\n    devnode \"^sd[a-z0-9]+\"\n}" > /etc/multipath.conf; systemctl restart multipathd 2>/dev/null; echo "Applied"'
          echo "Multipath fix complete. Sleeping..."
          sleep infinity
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 1m
            memory: 8Mi
          limits:
            cpu: 10m
            memory: 16Mi
      tolerations:
      - operator: Exists
      priorityClassName: system-node-critical
