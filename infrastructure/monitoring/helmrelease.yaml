apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "80.x"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: monitoring
      interval: 12h
  values:
    grafana:
      service:
        type: ClusterIP
    # Preserve the NodePort service for direct access
    extraManifests:
      - apiVersion: v1
        kind: Service
        metadata:
          name: grafana-nodeport
          namespace: monitoring
        spec:
          type: NodePort
          ports:
            - port: 80
              targetPort: 3000
              nodePort: 30300
          selector:
            app.kubernetes.io/instance: kube-prometheus-stack
            app.kubernetes.io/name: grafana
